<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rukano - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/inicioSesion.css">
</head>

<body>

<nav class="navbar">
    <h2>RUKANO</h2>
    <div>
        <a href="registro.html">
            <button>Registrarse</button>
        </a>
    </div>
</nav>

<div class="container">

    <div id="login">

        <h2>Iniciar sesión</h2>

        <input type="email" id="emailLogin" placeholder="Correo">
        <input type="password" id="passwordLogin" placeholder="Contraseña">

        <div class="checkbox">
            <input type="checkbox" id="showPasswordLogin">
            <label for="showPasswordLogin">Mostrar contraseña</label>
        </div>

        <button id="btnLogin">Ingresar</button>

    </div>

</div>

<script type="module" src="js/inicioSesion.js"></script>

</body>
</html>
