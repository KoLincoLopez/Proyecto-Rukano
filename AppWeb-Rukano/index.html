<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"

<body>

    <div class="logo-contenedor">
        <span class="logo-texto">RUKANO</span>

    <div class="capsula-menu">
        <div class="links-navegacion">
            <a href="#" class="link-item activo">Inicio</a>

            <a href="#" class="link-item">¿Como funciona?</a>
        </div>
        
        <button class="boton-hamburguesa">

    </div>
</nav>
        </header>

        <section class="seccion-hero">
