<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rukano - Panel Técnico</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 40px;
            width: 320px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px;
            margin-top: 20px;
            cursor: pointer;
            border: none;
            background: #2980b9;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background: #1f6694;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Bienvenido Técnico </h1>
        <p>Has iniciado sesión correctamente</p>

        <button id="btnLogout">Cerrar sesión</button>
    </div>

    <script type="module" src="js/panel.js"></script>

</body>
</html>
