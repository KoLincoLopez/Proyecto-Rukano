<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rukano - Panel</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 40px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Bienvenido 👋</h1>
        <p>Has iniciado sesión correctamente</p>

        <button onclick="logout()">Cerrar sesión</button>
    </div>

    <script>
        function logout() {
            alert("Sesión cerrada");
            window.location.href = "inicioSesion.html";
        }
    </script>

</body>
</html>
