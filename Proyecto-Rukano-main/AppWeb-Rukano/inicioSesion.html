<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rukano - Iniciar Sesión</title>
    <link rel="stylesheet" href="./css/inicioSesion.css">
</head>

<body>

    <div class="split-pantalla">

        <div class="split-imagen">
            <a href="index.html" class="logo-flotante">RUKANO</a>
        </div>

        <div class="split-formulario">
            
            <div class="nav-registro">
                <span>¿No tienes cuenta?</span>
                <a href="registro.html" class="btn-link">Regístrate aquí</a>
            </div>

            <div class="formulario-caja">
                <div id="login">
                    
                    <h2 class="titulo-form">BIENVENIDO</h2>
                    <p class="subtitulo-form">Ingresa a tu cuenta para continuar.</p>

                    <div class="grupo-input">
                        <input type="email" id="emailLogin" placeholder="Correo electrónico" required>
                    </div>
                    
                    <div class="grupo-input">
                        <input type="password" id="passwordLogin" placeholder="Contraseña" required>
                    </div>

                    <div class="checkbox-moderno">
                        <input type="checkbox" id="showPasswordLogin">
                        <label for="showPasswordLogin">Mostrar contraseña</label>
                    </div>

                    <button id="btnLogin" class="btn-primario">INGRESAR</button>

                    <p class="volver-inicio">
                        <a href="index.html">← Volver al inicio</a>
                    </p>

                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/transiciones.js"></script>
    <script type="module" src="js/inicioSesion.js"></script>

</body>
</html>
